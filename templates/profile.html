<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calora Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0e0e0e 40%, #1b1b1b 100%);
    color: #f8f8f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .container {
    border: 2px solid #ff7a00;
    border-radius: 20px;
    padding: 40px 60px;
    text-align: center;
    background: rgba(0,0,0,0.35);
    box-shadow: 0 0 40px rgba(255,122,0,0.35);
  }
  h2 { color: #ff7a00; }
  label { display: block; margin: 15px 0 5px; }
  input {
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    width: 160px;
    text-align: center;
  }
  button {
    margin-top: 20px;
    background: #ff7a00;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
  }
  button:hover {
    background: transparent;
    color: #ff7a00;
    border: 1px solid #ff7a00;
  }
  a { display:block; margin-top:20px; color:#ff7a00; text-decoration:none; }
</style>
</head>
<body>
  <div class="container">
    <h2>{{ profile.name }}'s Profile</h2>
    <p>Email: {{ profile.email }}</p>
    <form id="profileForm">
      <label>Height (cm)</label>
      <input type="number" id="height" value="{{ profile.height or '' }}" required>
      <label>Weight (kg)</label>
      <input type="number" id="weight" value="{{ profile.weight or '' }}" required>
      <label>TDEE (kcal/day)</label>
      <input type="number" id="tdee" value="{{ profile.tdee or '' }}">
      <button type="submit">Save</button>
    </form>
    <a href="/">← Back to Home</a>
  </div>

<script>
document.getElementById("profileForm").onsubmit = async (e) => {
  e.preventDefault();
  const payload = {
    height: parseFloat(document.getElementById("height").value),
    weight: parseFloat(document.getElementById("weight").value),
    tdee: parseFloat(document.getElementById("tdee").value)
  };
  const res = await fetch("/save_profile", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });
  if (res.ok) alert("Profile updated successfully!");
};
</script>
</body>
</html>
